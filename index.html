<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咔滋的森林</title>
    <meta name="description" content="咔滋的森林 — 个人档案馆：记忆、PhD 时间轴、Deep Cooking 迷思与菜谱、Deep Listening 听歌画像。">
    <link rel="canonical" href="https://kakamazov.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="咔滋的森林">
    <meta property="og:description" content="A personal archive of memory, research quarters, cooking notes, and repeated listening.">
    <meta property="og:url" content="https://kakamazov.com/">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%84%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="lenis.min.js" defer></script>
    <script src="enhance.js" defer></script>
</head>
<body>
    <!-- Scene layer (Phase 4): grain + vignette + animated canvas line field.
         Behind everything via z-index 0; #content sits at z-index 1. -->
    <div class="scene-layer" aria-hidden="true">
        <canvas class="scene-canvas"></canvas>
        <div class="scene-grain"></div>
        <div class="scene-vignette"></div>
    </div>

    <nav id="navbar">
        <button type="button" data-page="kazhi"     data-cursor-label="Go">咔滋</button>
        <button type="button" data-page="say"       data-cursor-label="Go">咔言咔语</button>
        <button type="button" data-page="cooking"   data-cursor-label="Go">Deep Cooking</button>
        <button type="button" data-page="listening" data-cursor-label="Go">Deep Listening</button>
    </nav>

    <div id="content"></div>

    <noscript>
        <p style="max-width: 640px; margin: 96px auto; padding: 0 24px;">
            咔滋的森林 — 个人档案馆：记忆、PhD 时间轴、Deep Cooking、Deep Listening。
            本站内容由 JavaScript 渲染，请启用 JavaScript 后访问。
        </p>
    </noscript>

    <!-- 详细内容弹窗 - 仅用于咔言咔语页面 -->
    <div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle" data-lenis-prevent>
        <div class="detail-content" data-lenis-prevent>
            <button class="close-btn" onclick="closeDetail()" data-cursor-label="Close" aria-label="关闭">&times;</button>
            <h2 class="detail-title" id="detailTitle"></h2>
            <div id="detailBody"></div>
        </div>
    </div>

    <!-- 编辑式增强层：自定义光标 + 项目悬停预览（仅在 fine pointer + 非 reduced-motion 环境下激活） -->
    <div class="cursor" aria-hidden="true">
        <div class="cursor__dot"></div>
        <div class="cursor__ring"></div>
        <div class="cursor__label">View</div>
    </div>
    <aside class="hover-preview" aria-hidden="true">
        <div class="hover-preview__art"></div>
        <div class="hover-preview__title"></div>
        <div class="hover-preview__meta"></div>
    </aside>
    

</body>
</html>
