        // 高清 Bing 壁纸 API 配置
        const bingWallpaperAPIs = {
            // 主 API - 使用最高分辨率
            primary: {
                // UHD 4K 分辨率
                today: 'https://bing.biturl.top/?resolution=UHD&format=json&index=0&mkt=zh-CN',
                random: 'https://bing.biturl.top/?resolution=UHD&format=json&index=random&mkt=zh-CN',
                directUHD: 'https://bing.biturl.top/?resolution=UHD&index=random',  // 4K 直接图片
                direct1920: 'https://bing.biturl.top/?resolution=1920&index=random'  // 1920 备用
            },
            // 备用高清 API
            backup: [
                'https://api.dujin.org/bing/1920.php',
                'https://bing.img.run/uhd.php',  // 超高清
                'https://source.unsplash.com/3840x2160/?nature,landscape',  // 4K Unsplash
                'https://picsum.photos/3840/2160'  // Lorem Picsum 4K
            ]
        };

        // 获取高清壁纸 URL
        async function getBingWallpaper(isRandom = false) {
            try {
                // 尝试获取 UHD 超高清壁纸
                const url = isRandom ? bingWallpaperAPIs.primary.random : bingWallpaperAPIs.primary.today;
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.url) {
                        // 确保获取原始高清图片
                        let hdUrl = data.url;
                        // 如果 URL 包含分辨率参数，替换为最高分辨率
                        if (hdUrl.includes('1920x1080')) {
                            hdUrl = hdUrl.replace('1920x1080', 'UHD');
                        }
                        if (hdUrl.includes('1920x1200')) {
                            hdUrl = hdUrl.replace('1920x1200', '3840x2160');
                        }
                        
                        return hdUrl;
                    }
                }
            } catch (error) {
                console.log('主 API 请求失败，尝试备用方案');
            }
            
            // 返回 4K 直接图片 URL
            return isRandom ? bingWallpaperAPIs.primary.directUHD : bingWallpaperAPIs.backup[0];
        }

        // 渲染咔滋页面 - 优化版
        function renderKazhi(data) {
            const content = document.getElementById('content');
            const randomText = data[Math.floor(Math.random() * data.length)];
            
            // 检查是否是今天第一次访问
            const today = new Date().toDateString();
            const lastVisit = sessionStorage.getItem('lastVisitDate');
            const visitCount = parseInt(sessionStorage.getItem('visitCount') || '0');
            const isFirstVisitToday = lastVisit !== today;
            
            // 更新访问记录
            if (isFirstVisitToday) {
                sessionStorage.setItem('lastVisitDate', today);
                sessionStorage.setItem('visitCount', '1');
            } else {
                sessionStorage.setItem('visitCount', (visitCount + 1).toString());
            }
            
            // 创建容器 - 全屏显示
            content.innerHTML = `
                <div class="kazhi-container">
                    <div class="image-container fullscreen">
                        <div class="image-loading">正在加载高清壁纸...</div>
                        <img id="bingImage" 
                            alt="每日壁纸" 
                            style="display: none;"
                            loading="eager"
                            decoding="async" />
                        <div class="image-overlay"></div>
                    </div>
                    <p class="kazhi-text">${randomText.text}</p>
                </div>
            `;
            
            const img = document.getElementById('bingImage');
            const loadingDiv = document.querySelector('.image-loading');
            
            // 预加载图片以获得更好的性能
            const preloadImage = new Image();
            
            getBingWallpaper(visitCount > 1).then(imageUrl => {
                preloadImage.onload = function() {
                    img.src = this.src;
                    loadingDiv.style.display = 'none';
                    img.style.display = 'block';
                    
                    // 添加加载完成的动画
                    img.classList.add('loaded');
                };
                
                preloadImage.onerror = function() {
                    console.log('高清图片加载失败，尝试备用源');
                    // 降级到 1920 分辨率
                    preloadImage.src = bingWallpaperAPIs.primary.direct1920;
                };
                
                // 开始加载高清图片
                preloadImage.src = imageUrl;
            }).catch(error => {
                // 使用备用高清源
                preloadImage.src = bingWallpaperAPIs.backup[2]; // Unsplash 4K
                preloadImage.onload = function() {
                    img.src = this.src;
                    loadingDiv.style.display = 'none';
                    img.style.display = 'block';
                    img.classList.add('loaded');
                };
            });
        }
        // 渲染咔言咔语页面
        function renderSay(data) {
            const content = document.getElementById('content');
            let html = '<div class="say-container">';
            
            Object.keys(data).forEach((category, index) => {
                html += `
                    <div class="category-section">
                        <h3 class="category-title" onclick="toggleCategory(this)">
                            ${category}
                        </h3>
                        <div class="category-content">
                `;
                
                data[category].forEach(item => {
                    html += `<p class="say-item">${item}</p>`;
                });
                
                html += '</div></div>';
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // 切换分类显示/隐藏
        function toggleCategory(element) {
            const content = element.nextElementSibling;
            const isOpen = content.classList.contains('open');
            
            // 关闭所有其他分类
            document.querySelectorAll('.category-content').forEach(el => {
                el.classList.remove('open');
            });
            
            // 切换当前分类
            if (!isOpen) {
                content.classList.add('open');
            }
        }
        
        // 渲染Deep Cooking页面
        function renderCooking(data) {
            const content = document.getElementById('content');
            let html = '<div class="cooking-container">';
            
            html += `<p class="philosophy">${data.philosophy}</p>`;
            
            Object.keys(data.recipes).forEach(category => {
                if (data.recipes[category].length > 0) {
                    html += `<div class="recipe-category">
                        <h3 class="recipe-category-title">${category}</h3>
                        <div class="recipe-list">`;
                    
                    data.recipes[category].forEach(recipe => {
                        html += `
                            <div class="recipe-item">
                                <img src="${recipe.image}" alt="${recipe.title}" />
                                <span class="recipe-title">${recipe.title}</span>
                            </div>
                        `;
                    });
                    
                    html += '</div></div>';
                }
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // 渲染Deep Listening页面
        function renderListening(data) {
            const content = document.getElementById('content');
            let html = '<div class="listening-container"><ul class="song-list">';
            
            data.forEach(song => {
                html += `
                    <li class="song-item">
                        <span class="song-title">${song.title}</span>
                        <span class="song-artist">${song.artist}</span>
                    </li>
                `;
            });
            
            html += '</ul></div>';
            content.innerHTML = html;
        }
        
        // 实际部署时使用的fetch函数
        function loadPageWithFetch(pageName) {
            const content = document.getElementById('content');
            
            // 更新导航激活状态
            document.querySelectorAll('#navbar span').forEach(span => {
                span.classList.remove('active');
                if (span.getAttribute('data-page') === pageName) {
                    span.classList.add('active');
                }
            });
            
            content.style.opacity = '0';
            
            fetch(`data/${pageName}.json`)
                .then(response => response.json())
                .then(data => {
                    setTimeout(() => {
                        if (pageName === 'kazhi') {
                            renderKazhi(data);
                        } else if (pageName === 'say') {
                            renderSay(data);
                        } else if (pageName === 'cooking') {
                            renderCooking(data);
                        } else if (pageName === 'listening') {
                            renderListening(data);
                        }
                        
                        setTimeout(() => {
                            content.style.opacity = '1';
                        }, 50);
                    }, 300);
                })
                .catch(error => {
                    console.error('Error loading page:', error);
                    content.innerHTML = '<p class="error">页面加载失败</p>';
                    content.style.opacity = '1';
                });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定导航点击事件
            document.querySelectorAll('#navbar span').forEach(item => {
                item.onclick = () => {
                    // loadPage(item.getAttribute('data-page'));

                };
            });
            
            // 默认加载咔滋页面
            // loadPage('kazhi');
            loadPageWithFetch('kazhi');
