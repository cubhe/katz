                }
            },
            listening: [
                { "title": "可能是夜晚", "artist": "陈粒" },
                { "title": "Reflections", "artist": "Nils Frahm" },
                { "title": "Arrival of the Birds", "artist": "The Cinematic Orchestra" },
                { "title": "春风十里", "artist": "鹿先森乐队" },
                { "title": "Mad World", "artist": "Gary Jules" },
                { "title": "River Flows in You", "artist": "Yiruma" },
                { "title": "大风吹", "artist": "草东没有派对" },

        // 咔言咔语页面的9宫格内容数据 - 从JSON文件读取后转换
        let sayContentData = {};

        let weiboData = { weibo: [] };

        // 加载页面函数
        function loadPage(pageName) {
            const content = document.getElementById('content');
            
            // 更新导航激活状态
            document.querySelectorAll('#navbar span').forEach(span => {
                span.classList.remove('active');
                if (span.getAttribute('data-page') === pageName) {
                    span.classList.add('active');
                }
            });
            
            // 淡出效果
            content.style.opacity = '0';
            
            setTimeout(() => {
                // 模拟异步加载
                const data = mockData[pageName];
                
                if (pageName === 'kazhi') {
                    renderKazhi(data);
                } else if (pageName === 'say') {
                    renderSayGrid(data); // 使用9宫格版本
                } else if (pageName === 'cooking') {
                    renderCooking(data);
                } else if (pageName === 'listening') {
                    renderListening(data);
                }
                
                // 淡入效果
                setTimeout(() => {
                    content.style.opacity = '1';
                }, 50);
            }, 300);
        }

        // 修改这两个函数，直接使用传入的data
        function getLastYearTodayWeibo(data) {
            const today = new Date();
            const lastYear = today.getFullYear() - 1;
            const targetMonth = today.getMonth() + 1;
            const targetDay = today.getDate();

            const matchingWeibos = data.weibo.filter(weibo => {
                const weiboDate = parseWeiboDate(weibo.createdAt);
                return weiboDate.getFullYear() === lastYear &&
                    weiboDate.getMonth() + 1 === targetMonth &&
                    weiboDate.getDate() === targetDay;
            });

            if (matchingWeibos.length > 0) {
                return matchingWeibos[Math.floor(Math.random() * matchingWeibos.length)];
            }

            // 如果没有找到，返回最接近的
            const sortedWeibos = data.weibo
                .map(weibo => ({
                    ...weibo,
                    date: parseWeiboDate(weibo.createdAt)
                }))
                .sort((a, b) => {
                    const aDiff = Math.abs(a.date.getMonth() - today.getMonth()) + 
                                Math.abs(a.date.getDate() - today.getDate());
                    const bDiff = Math.abs(b.date.getMonth() - today.getMonth()) + 
                                Math.abs(b.date.getDate() - today.getDate());
                    return aDiff - bDiff;
                });

            return sortedWeibos[0];
        }

        function getRandomWeibo(data) {
            const randomIndex = Math.floor(Math.random() * data.weibo.length);
            return data.weibo[randomIndex];
        }

        // 解析日期字符串
        function parseWeiboDate(dateStr) {
            return new Date(dateStr);
        }

        // 格式化微博文本，去掉多余的符号和换行
        function formatWeiboText(text) {
            return text
                .replace(/\n/g, ' ')
                .replace(/[​\u200B-\u200D\uFEFF]/g, '') // 移除零宽字符
                .replace(/\s+/g, ' ') // 合并多个空格
                .trim()
                .substring(0, 520) + (text.length > 520 ? '...' : ''); // 限制长度
        }

        // 格式化日期显示
        function formatDate(dateStr) {
            const date = parseWeiboDate(dateStr);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 渲染咔滋页面 - 纯文字版本，不使用图片
        function renderKazhi(data) {
            const content = document.getElementById('content');
            
            // 检查是否是今天第一次访问
            const today = new Date().toDateString();
            const lastVisit = sessionStorage.getItem('lastVisitDate');
            const visitCount = parseInt(sessionStorage.getItem('visitCount') || '0');
            const isFirstVisitToday = lastVisit !== today;
            
            // 更新访问记录
            if (isFirstVisitToday) {
                sessionStorage.setItem('lastVisitDate', today);
                sessionStorage.setItem('visitCount', '1');
            } else {
                sessionStorage.setItem('visitCount', (visitCount + 1).toString());
            }
            
            // 根据访问次数选择微博
            let selectedWeibo;
            let isLastYearToday = false;
            const currentVisitCount = parseInt(sessionStorage.getItem('visitCount'));
            
            if (currentVisitCount === 1) {
                selectedWeibo = getLastYearTodayWeibo(data);
                isLastYearToday = true;
            } else {
                selectedWeibo = getRandomWeibo(data);
            }
            
            const weiboText = formatWeiboText(selectedWeibo.text);
            const weiboDate = formatDate(selectedWeibo.createdAt);
            
            // 创建容器 - 纯文字版本
            content.innerHTML = `
                <div class="kazhi-container text-only">
                    <div class="weibo-date">
                        ${isLastYearToday ? '去年今日' : '随机回忆'} · ${weiboDate}
                    </div>
                    <p class="kazhi-text">${weiboText}</p>
                </div>
            `;
        }

        // 新增：从JSON数据转换为9宫格格式
        function convertSayDataToGrid(jsonData) {
            const categoryMapping = {
                'Philosophy': { key: 'philosophy', title: '哲思' },
                'Travel': { key: 'travel', title: '行走' },
                'Life': { key: 'life', title: '日常' },
                'Tech': { key: 'tech', title: '代码' },
                'Food': { key: 'food', title: '食物' },
                'Nature': { key: 'nature', title: '自然' }
            };

            const result = {};
            
            Object.keys(categoryMapping).forEach(jsonKey => {
                if (jsonData[jsonKey]) {
                    const mapping = categoryMapping[jsonKey];
                    result[mapping.key] = {
                        title: mapping.title,
                        description: jsonData[jsonKey][0], // 使用第一条作为描述
                        items: jsonData[jsonKey]
                    };
                }
            });

            return result;
        }

        // 新增：渲染咔言咔语页面为9宫格
        function renderSayGrid(jsonData) {
            const content = document.getElementById('content');
            
            // 转换数据格式并更新全局变量
            sayContentData = convertSayDataToGrid(jsonData);
            
            content.innerHTML = `
                <div class="grid-container">
                    <div class="card" data-content="philosophy">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">哲思</h3>
                            <p class="card-description">感情像神经网络，训练过拟合就难以泛化</p>
                        </div>
                    </div>

                    <div class="card" data-content="travel">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">行走</h3>
                            <p class="card-description">在旧金山烈日下喝冰美式是人类学意义的一种幸福</p>
                        </div>
                    </div>

                    <div class="card" data-content="life">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">日常</h3>
                            <p class="card-description">做饭是我与混沌系统对话的方式</p>
                        </div>
                    </div>

                    <div class="card" data-content="tech">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">代码</h3>
                            <p class="card-description">Debug 就像考古，每个 bug 都有它的历史</p>
                        </div>
                    </div>

                    <div class="card" data-content="food">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">

                            <p class="card-description">火候是一个连续变量，调料是离散选择</p>
                        </div>
                    </div>

                    <div class="card" data-content="nature">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">自然</h3>
                            <p class="card-description">树的分形结构是自然界最优雅的算法</p>
                        </div>
                    </div>

                    <div class="card empty-card">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">·</h3>
                            <p class="card-description">留白也是一种表达</p>
                        </div>
                    </div>

                    <div class="card empty-card">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">·</h3>
                            <p class="card-description">静默胜过千言</p>
                        </div>
                    </div>

                    <div class="card empty-card">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <h3 class="card-title">·</h3>
                            <p class="card-description">空即是色</p>
                        </div>
                    </div>
                </div>
            `;

            // 为卡片添加点击事件
            setTimeout(() => {
                document.querySelectorAll('.card:not(.empty-card)').forEach(card => {
                    card.addEventListener('click', function() {
                        this.classList.add('clicked');
                        setTimeout(() => {
                            const contentType = this.getAttribute('data-content');
                            showDetail(contentType);
                            this.classList.remove('clicked');
                        }, 200);
                    });
                });
            }, 100);
        }

        // 显示详情弹窗
        function showDetail(type) {
            const overlay = document.getElementById('detailOverlay');
            const title = document.getElementById('detailTitle');
            const body = document.getElementById('detailBody');
            
            const data = sayContentData[type];
            if (!data) return; // 如果没有数据则不显示
            
            title.textContent = data.title;
            
            let bodyHTML = '<div class="content-section">';
            bodyHTML += '<h3 class="section-title">思绪片段</h3>';
            data.items.forEach(item => {
                bodyHTML += `<div class="content-item">${item}</div>`;
            });
            bodyHTML += '</div>';
            
            body.innerHTML = bodyHTML;
            overlay.classList.add('active');
            
            // 防止背景滚动
            document.body.style.overflow = 'hidden';
        }

        // 关闭详情弹窗
        function closeDetail() {
            const overlay = document.getElementById('detailOverlay');
            overlay.classList.remove('active');
            
            // 恢复背景滚动
            document.body.style.overflow = '';
        }

        // 渲染Deep Cooking页面
        function renderCooking(data) {
            const content = document.getElementById('content');
            let html = '<div class="cooking-container">';
            
            html += `<p class="philosophy">${data.philosophy}</p>`;
            
            Object.keys(data.recipes).forEach(category => {
                if (data.recipes[category].length > 0) {
                    html += `<div class="recipe-category">
                        <h3 class="recipe-category-title">${category}</h3>
                        <div class="recipe-list">`;
                    
                    data.recipes[category].forEach(recipe => {
                        html += `
                            <div class="recipe-item">
                                <img src="${recipe.image}" alt="${recipe.title}" />
                                <span class="recipe-title">${recipe.title}</span>
                            </div>
                        `;
                    });
                    
                    html += '</div></div>';
                }
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // 渲染Deep Listening页面 - 折叠式布局
        function renderListening(data) {
            const content = document.getElementById('content');
            let html = '<div class="listening-container">';
            
            Object.keys(data).forEach(playlistName => {
                html += `
                    <div class="playlist-section">
                        <h3 class="playlist-title" onclick="togglePlaylist(this)">${playlistName}</h3>
                        <div class="playlist-content">
                            <ul class="song-list">
                `;
                
                data[playlistName].forEach(song => {
                    html += `
                        <li class="song-item">
                            <span class="song-title">${song.title}</span>
                            <span class="song-artist">${song.artist}</span>
                        </li>
                    `;
                });
                
                html += '</ul></div></div>';
            });
            
            html += '</div>';
            content.innerHTML = html;
        }

        // 切换歌单显示/隐藏
        function togglePlaylist(element) {
            const content = element.nextElementSibling;
            const isOpen = content.classList.contains('open');
            
            // 关闭所有其他歌单
            document.querySelectorAll('.playlist-content').forEach(el => {
                el.classList.remove('open');
            });
            
            // 切换当前歌单
            if (!isOpen) {
                content.classList.add('open');
            }
        }

        // 实际部署时使用的fetch函数 - 支持从JSON文件读取
        function loadPageWithFetch(pageName) {
            const content = document.getElementById('content');
            
            // 更新导航激活状态
            document.querySelectorAll('#navbar span').forEach(span => {
                span.classList.remove('active');
                if (span.getAttribute('data-page') === pageName) {
                    span.classList.add('active');
                }
            });
            
            content.style.opacity = '0';
            
            // 特殊处理 kazhi 页面
            if (pageName === 'kazhi') {
                Promise.all([
                    fetch('data/weibo.json').then(response => response.json()),
                    fetch('data/weibo2.json').then(response => response.json())
                ])
                .then(([data1, data2]) => {
                    // 合并两个文件的weibo数据
                    const mergedData = {
                        weibo: [...(data1.weibo || []), ...(data2.weibo || [])]
                    };
                    
                    setTimeout(() => {
                        // 更新全局weiboData
                        weiboData.weibo = mergedData.weibo;
                        renderKazhi(mergedData);
                        
                        // 淡入效果
                        setTimeout(() => {
                            content.style.opacity = '1';
                        }, 50);
                    }, 300);
                })
                .catch(error => {
                    console.error('Error loading weibo data:', error);
                    setTimeout(() => {
                        content.innerHTML = '<p class="error">页面加载失败</p>';
                        content.style.opacity = '1';
                    }, 300);
                });
                return; // 提前返回，避免执行后面的通用逻辑
            }
            
            // 其他页面的通用处理
            const dataFile = `${pageName}.json`;
            
            fetch(`data/${dataFile}`)
                .then(response => response.json())
                .then(data => {
                    setTimeout(() => {
                        if (pageName === 'say') {
                            renderSayGrid(data); // 使用9宫格版本
                        } else if (pageName === 'cooking') {
                            renderCooking(data);
                        } else if (pageName === 'listening') {
                            renderListening(data);
                        }
                        
                        // 淡入效果
                        setTimeout(() => {
                            content.style.opacity = '1';
                        }, 50);
                    }, 300);
                })
                .catch(error => {
                    console.error('Error loading page:', error);
                    setTimeout(() => {
                        content.innerHTML = '<p class="error">页面加载失败</p>';
                        content.style.opacity = '1';
                    }, 300);
                });
        }
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定导航点击事件
            document.querySelectorAll('#navbar span').forEach(item => {
                item.onclick = () => {
                    loadPageWithFetch(item.getAttribute('data-page'));
                };
            });
            
            // 默认加载咔滋页面
            loadPageWithFetch('kazhi');

            // 点击遮罩关闭详情弹窗
            document.getElementById('detailOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeDetail();
                }
            });

            // ESC键关闭详情弹窗
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeDetail();
                }
            });
        });
    </script>
</body>
</html>
